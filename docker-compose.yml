services:
   the-fire-bot:
     image: ghcr.io/riskymh/the-fire-bot:latest
     build: .
     restart: unless-stopped
     init: true
     extra_hosts:
       - "host.docker.internal:host-gateway"
     environment:
       DATABASE_URL: ${DATABASE_URL:-sqlite:///data/db.sqlite}
       DISCORD_TOKEN: ${DISCORD_TOKEN:?REQUIRED}
       NODE_ENV: production
       FORCE_COLOR: 1
     volumes:
        - data:/data
     deploy:
       resources:
         limits:
           memory: 64M
         reservations:
           memory: 32M

volumes:
  data:
